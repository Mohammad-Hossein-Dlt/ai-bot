apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin_api
  template:
    metadata:
      labels:
        app: admin_api
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: admin_api
          image: registry-fc6690c55a-mini-ecommerce.apps.ir-central1.arvancaas.ir/admin_api:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api-service
spec:
  type: ClusterIP
  selector:
    app: admin_api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
