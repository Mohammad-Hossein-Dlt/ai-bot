apiVersion: apps/v1
kind: Deployment
metadata:
  name: bale-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bale_bot
  template:
    metadata:
      labels:
        app: bale_bot
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: bale_bot
          image: registry-fc6690c55a-mini-ecommerce.apps.ir-central1.arvancaas.ir/bale_bot:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: bale-bot-service
spec:
  type: ClusterIP
  selector:
    app: bale_bot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
